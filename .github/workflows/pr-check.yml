name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Download Go dependencies
        run: go mod download

      - name: Run check (lint + test)
        run: make check
